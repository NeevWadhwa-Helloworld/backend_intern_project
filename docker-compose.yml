version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: mern_mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - mern-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mern_backend
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/task_db
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 7d
      COOKIE_EXPIRES_IN: 7
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:5173}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ALLOW_ALL_ORIGINS: ${ALLOW_ALL_ORIGINS:-false}
      SWAGGER_URL: ${SWAGGER_URL:-http://localhost:5000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:5000}
    depends_on:
      - mongo
    networks:
      - mern-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: mern_frontend
    ports:
      - '5173:80'
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    depends_on:
      - backend
    networks:
      - mern-network
    restart: always

volumes:
  mongo-data:
    driver: local

networks:
  mern-network:
    driver: bridge
